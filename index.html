<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Photo Share</title>
  
  <!-- JSZip (一括保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            theme: 'var(--theme-color)',
            themeDark: 'var(--theme-color-dark)',
          }
        }
      }
    }
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      /* デフォルトのテーマカラー (Amber系) */
      --theme-color: #d97706; 
      --theme-color-dark: #b45309;
    }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-fade { animation: slideFade 5s ease-in-out infinite; }
    @keyframes slideFade {
      0% { opacity: 0; transform: scale(1.05); }
      10% { opacity: 1; transform: scale(1); }
      90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95); }
    }
    /* スクロールバー非表示（スライドショー用） */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col font-sans transition-colors duration-500">

  <!-- ヘッダー -->
  <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3 truncate">
        <div class="bg-theme text-white p-2 rounded-full shadow-sm">
          <i class="fa-solid fa-camera-retro"></i>
        </div>
        <div class="truncate">
          <h1 id="headerEventName" class="text-lg md:text-xl font-bold tracking-wide text-stone-900 truncate">Share Gallery</h1>
          <p id="headerEventDate" class="text-xs text-stone-500 truncate"></p>
        </div>
      </div>
      
      <div class="flex items-center space-x-2 md:space-x-4 flex-shrink-0">
        <!-- スライドショー起動ボタン -->
        <button id="btnStartSlideshow" class="text-stone-500 hover:text-theme transition-colors p-2 rounded-full hover:bg-stone-100" title="スライドショー">
          <i class="fa-solid fa-play text-lg"></i>
        </button>
        <!-- 設定ボタン -->
        <button id="btnOpenSettings" class="text-stone-500 hover:text-theme transition-colors p-2 rounded-full hover:bg-stone-100" title="設定">
          <i class="fa-solid fa-gear text-lg"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-6 md:py-8">
    
    <!-- ヒーロー・アップロードセクション -->
    <div class="mb-10 text-center max-w-2xl mx-auto">
      <p id="mainSubMessage" class="text-stone-600 text-sm md:text-base leading-relaxed mb-6 whitespace-pre-wrap">
        大切な瞬間をみんなでシェア
      </p>

      <!-- ゲスト情報 -->
      <div class="mb-4 text-xs md:text-sm text-stone-500 flex items-center justify-center space-x-2">
        <i class="fa-regular fa-user"></i>
        <span>現在の参加名: <span id="displayGuestName" class="font-bold text-theme">ゲスト</span></span>
        <button onclick="promptGuestName(true)" class="underline text-stone-400 hover:text-stone-600">変更</button>
      </div>

      <!-- アップロードボタンエリア (分離) -->
      <div class="grid grid-cols-2 gap-3 md:gap-6">
        <!-- カメラ起動 (初期状態は無効化、接続後に有効化) -->
        <div id="btnCamera" class="bg-white border-2 border-stone-200 rounded-2xl p-4 md:p-6 opacity-50 pointer-events-none cursor-pointer hover:border-theme hover:shadow-md transition-all group flex flex-col items-center justify-center">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" />
          <div class="bg-theme/10 text-theme w-12 h-12 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
            <i class="fa-solid fa-camera text-xl"></i>
          </div>
          <span class="font-bold text-stone-800 text-sm md:text-base">写真を撮る</span>
        </div>
        
        <!-- ライブラリから選択 (初期状態は無効化、接続後に有効化) -->
        <div id="btnLibrary" class="bg-white border-2 border-stone-200 rounded-2xl p-4 md:p-6 opacity-50 pointer-events-none cursor-pointer hover:border-theme hover:shadow-md transition-all group flex flex-col items-center justify-center">
          <input type="file" id="libraryInput" accept="image/*" class="hidden" />
          <div class="bg-theme/10 text-theme w-12 h-12 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
            <i class="fa-regular fa-images text-xl"></i>
          </div>
          <span class="font-bold text-stone-800 text-sm md:text-base">写真を選ぶ</span>
        </div>
      </div>

      <!-- アップロード中プログレスバー -->
      <div id="uploadProgressContainer" class="hidden mt-6 bg-white p-4 rounded-xl border border-stone-200 shadow-sm text-left">
        <div class="flex justify-between items-center text-xs text-stone-600 mb-2">
          <span class="font-medium"><i class="fa-solid fa-spinner animate-spin mr-2"></i>処理・保存中...</span>
          <span id="uploadPercentage">準備中...</span>
        </div>
        <div class="w-full bg-stone-100 rounded-full h-2.5 overflow-hidden">
          <div id="uploadProgressBar" class="bg-theme h-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- ギャラリー表示エリア -->
    <div class="border-t border-stone-200 pt-6">
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h3 class="text-lg font-bold text-stone-900 flex items-center">
          <i class="fa-solid fa-photo-film mr-2 text-theme"></i>
          アルバム (<span id="photoCount">0</span>枚)
        </h3>
        
        <!-- 並び替えコントロール -->
        <div class="flex items-center space-x-2 text-sm bg-white border border-stone-200 rounded-lg p-1 shadow-sm">
          <button id="sortNewest" class="px-3 py-1.5 rounded-md bg-stone-100 font-medium text-stone-800 transition-colors">最新順</button>
          <button id="sortPopular" class="px-3 py-1.5 rounded-md text-stone-500 hover:text-stone-800 transition-colors flex items-center">
            <i class="fa-solid fa-heart text-rose-500 mr-1 text-xs"></i>人気順
          </button>
        </div>
      </div>

      <!-- 読み込み中スケルトン -->
      <div id="gallerySkeleton" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
        <div class="aspect-square bg-stone-200 animate-pulse rounded-xl"></div>
        <div class="aspect-square bg-stone-200 animate-pulse rounded-xl"></div>
        <div class="aspect-square bg-stone-200 animate-pulse rounded-xl"></div>
      </div>

      <!-- フォトグリッド本体 -->
      <div id="photoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 hidden">
        <!-- JSで動的に追加されます -->
      </div>

      <!-- 空状態 -->
      <div id="emptyState" class="hidden text-center py-16">
        <div class="bg-stone-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-stone-300 text-3xl">
          <i class="fa-regular fa-image"></i>
        </div>
        <p class="text-stone-500 font-medium">まだ写真がありません</p>
      </div>
    </div>
  </main>

  <!-- スライドショー モーダル -->
  <div id="slideshowModal" class="fixed inset-0 bg-black z-50 hidden flex-col justify-center items-center">
    <button id="btnCloseSlideshow" class="absolute top-4 right-4 text-white/50 hover:text-white z-50 p-4 bg-black/20 rounded-full backdrop-blur-sm transition-colors">
      <i class="fa-solid fa-xmark text-2xl"></i>
    </button>
    <div id="slideshowContainer" class="w-full h-full relative flex items-center justify-center">
      <!-- 画像がフェードで切り替わる -->
    </div>
    <div class="absolute bottom-6 left-0 right-0 text-center z-50">
      <p id="slideshowInfo" class="text-white/80 bg-black/40 inline-block px-4 py-2 rounded-full backdrop-blur-sm text-sm shadow-lg"></p>
    </div>
  </div>

  <!-- ライトボックス (拡大表示) -->
  <div id="lightbox" class="fixed inset-0 bg-stone-950/95 backdrop-blur-md z-50 hidden flex-col justify-between p-2 md:p-4 transition-opacity">
    <div class="flex justify-between items-center w-full max-w-5xl mx-auto py-2 z-10">
      <div class="text-stone-300 text-xs md:text-sm flex flex-col">
        <span id="lightboxGuest" class="font-bold text-white mb-1"><i class="fa-solid fa-user-pen mr-1"></i></span>
        <span id="lightboxTime"></span>
      </div>
      <div class="flex items-center space-x-1 md:space-x-3">
        <button id="closeLightboxBtn" class="bg-white/10 hover:bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
    
    <div class="flex-grow flex items-center justify-center max-w-5xl mx-auto w-full relative">
      <img id="lightboxImg" src="" class="max-h-[70vh] max-w-full object-contain rounded-lg shadow-2xl" />
    </div>

    <!-- アクションバー -->
    <div class="w-full max-w-xl mx-auto py-4 flex justify-center space-x-6 z-10 bg-black/30 rounded-full px-6 mb-4 backdrop-blur-sm">
      <!-- いいね -->
      <button id="lbLikeBtn" class="flex flex-col items-center justify-center text-white/70 hover:text-rose-500 transition-colors w-16">
        <i class="fa-solid fa-heart text-2xl mb-1 transition-transform" id="lbLikeIcon"></i>
        <span class="text-xs font-bold" id="lbLikeCount">0</span>
      </button>
      <!-- ダウンロード -->
      <a id="lbDownloadBtn" href="#" target="_blank" download class="flex flex-col items-center justify-center text-white/70 hover:text-white transition-colors w-16">
        <i class="fa-solid fa-arrow-down text-2xl mb-1"></i>
        <span class="text-xs">保存</span>
      </a>
      <!-- 削除 -->
      <button id="lbDeleteBtn" class="flex flex-col items-center justify-center text-white/70 hover:text-red-500 transition-colors w-16">
        <i class="fa-solid fa-trash-can text-2xl mb-1"></i>
        <span class="text-xs">削除</span>
      </button>
    </div>
  </div>

  <!-- イベント設定 モーダル -->
  <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-md w-full max-h-[90vh] overflow-y-auto no-scrollbar shadow-xl fade-in">
      <div class="sticky top-0 bg-white border-b border-stone-100 px-6 py-4 flex justify-between items-center z-10">
        <h2 class="text-lg font-bold"><i class="fa-solid fa-sliders text-theme mr-2"></i>イベント設定</h2>
        <button onclick="closeSettings()" class="text-stone-400 hover:text-stone-700 w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100"><i class="fa-solid fa-xmark"></i></button>
      </div>
      
      <div class="p-6 space-y-5">
        <div>
          <label class="block text-xs font-bold text-stone-600 mb-1">イベント名 / タイトル</label>
          <input type="text" id="setEventName" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:border-theme focus:ring-1 focus:ring-theme" />
        </div>
        <div>
          <label class="block text-xs font-bold text-stone-600 mb-1">日付</label>
          <input type="text" id="setEventDate" placeholder="例: 2026年11月22日" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:border-theme focus:ring-1 focus:ring-theme" />
        </div>
        <div>
          <label class="block text-xs font-bold text-stone-600 mb-1">サブメッセージ</label>
          <textarea id="setSubMessage" rows="2" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:outline-none focus:border-theme focus:ring-1 focus:ring-theme resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-stone-600 mb-1">テーマカラー</label>
            <div class="flex items-center space-x-2">
              <input type="color" id="setThemeColor" class="w-10 h-10 rounded cursor-pointer border-0 p-0" />
              <span class="text-xs text-stone-500">色を選択</span>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-stone-600 mb-1">アップロード画質</label>
            <select id="setQuality" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:border-theme">
              <option value="1.0">最高画質 (大サイズ)</option>
              <option value="0.8">標準 (おすすめ)</option>
              <option value="0.5">低画質 (通信量節約)</option>
            </select>
          </div>
        </div>

        <div class="pt-4 border-t border-stone-100 flex justify-end">
          <button id="btnSaveSettings" class="bg-theme hover:bg-themeDark text-white font-bold px-6 py-2 rounded-full shadow-sm transition-colors text-sm w-full md:w-auto">
            設定を全体に反映する
          </button>
        </div>

        <div class="pt-6 border-t border-stone-100">
          <h3 class="text-sm font-bold text-stone-800 mb-3"><i class="fa-solid fa-toolbox mr-1"></i>管理者ツール</h3>
          <div class="space-y-3">
            <button id="btnDownloadAll" class="w-full bg-stone-100 hover:bg-stone-200 text-stone-700 font-medium px-4 py-3 rounded-xl text-sm flex items-center justify-between transition-colors">
              <span><i class="fa-solid fa-file-zipper mr-2 text-indigo-500"></i>全画像をZIPで一括保存</span>
              <i class="fa-solid fa-chevron-right text-stone-400"></i>
            </button>
            <button id="btnDeleteAll" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 font-medium px-4 py-3 rounded-xl text-sm flex items-center justify-between transition-colors">
              <span><i class="fa-solid fa-triangle-exclamation mr-2"></i>全画像をサーバーから削除</span>
              <i class="fa-solid fa-chevron-right text-rose-400"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ゲスト名入力 モーダル -->
  <div id="guestNameModal" class="fixed inset-0 bg-stone-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl fade-in">
      <div class="w-16 h-16 bg-theme/10 text-theme rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fa-solid fa-champagne-glasses"></i>
      </div>
      <h3 class="text-xl font-bold mb-2">ようこそ！</h3>
      <p class="text-stone-500 text-sm mb-6">みんなにわかるように、<br>あなたのお名前（ニックネーム）を教えてください。</p>
      <input type="text" id="inputGuestName" placeholder="お名前を入力" class="w-full text-center border-2 border-stone-200 rounded-xl px-4 py-3 text-lg font-bold focus:outline-none focus:border-theme mb-4" />
      <button onclick="saveGuestName()" class="w-full bg-theme hover:bg-themeDark text-white font-bold py-3 rounded-xl shadow-md transition-all">
        ギャラリーに参加する
      </button>
    </div>
  </div>

  <!-- 汎用ダイアログ -->
  <div id="customDialog" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl text-center fade-in">
      <div id="dialogIcon" class="text-4xl mb-3"></div>
      <h4 id="dialogTitle" class="text-lg font-bold text-stone-900 mb-2"></h4>
      <p id="dialogMessage" class="text-stone-600 text-sm mb-6"></p>
      <div id="dialogActions" class="flex justify-center space-x-3">
        <!-- 動的にボタン追加 -->
      </div>
    </div>
  </div>

  <!-- トースト通知 (自動消滅する親切なお知らせメッセージ) -->
  <div id="toastNotification" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-900/95 text-white text-sm px-6 py-3.5 rounded-full shadow-xl z-[70] transition-all duration-300 transform translate-y-12 opacity-0 pointer-events-none flex items-center space-x-2.5">
    <i class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
    <span id="toastMessage" class="font-medium tracking-wide">写真を保存しました！</span>
  </div>

  <!-- Firebase SDK & ロジック -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, deleteDoc, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
  apiKey: "AIzaSyAlAIugy8K-wb1LeJYftnY1oh6UEmvjjLQ",
  authDomain: "mysnap-4e695.firebaseapp.com",
  projectId: "mysnap-4e695",
  storageBucket: "mysnap-4e695.firebasestorage.app",
  messagingSenderId: "52063507810",
  appId: "1:52063507810:web:9962faa66eb249a4ee883b",
  measurementId: "G-2HZQ6G0FTV"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = firebaseConfig.appId;

　　// --- グローバルステート ---
    let currentUser = null;
    let photoList = []; // 最新の全画像データ
    let currentSort = 'newest'; // 'newest' | 'popular'
    let currentSettings = {
      eventName: "Share Gallery",
      eventDate: "Today",
      subMessage: "素敵な写真をみんなで共有しよう",
      themeColor: "#d97706",
      uploadQuality: 0.8
    };
    let guestName = localStorage.getItem(`event_${appId}_guestName`) || '';
    let slideshowInterval = null;
    let currentLightboxPhotoId = null;
    let currentLightboxPhoto = null; // 現在ライトボックスで開いている写真オブジェクト全体

    // --- DOM要素 ---
    const els = {
      grid: document.getElementById('photoGrid'),
      skeleton: document.getElementById('gallerySkeleton'),
      empty: document.getElementById('emptyState'),
      count: document.getElementById('photoCount'),
      headerName: document.getElementById('headerEventName'),
      headerDate: document.getElementById('headerEventDate'),
      subMsg: document.getElementById('mainSubMessage'),
      displayGuestName: document.getElementById('displayGuestName'),
      sortNew: document.getElementById('sortNewest'),
      sortPop: document.getElementById('sortPopular'),
      
      // Upload
      camIn: document.getElementById('cameraInput'),
      libIn: document.getElementById('libraryInput'),
      progCont: document.getElementById('uploadProgressContainer'),
      progBar: document.getElementById('uploadProgressBar'),
      progPct: document.getElementById('uploadPercentage'),
      btnCamera: document.getElementById('btnCamera'),
      btnLibrary: document.getElementById('btnLibrary'),
      
      // Lightbox
      lb: document.getElementById('lightbox'),
      lbImg: document.getElementById('lightboxImg'),
      lbTime: document.getElementById('lightboxTime'),
      lbGuest: document.getElementById('lightboxGuest'),
      lbLikeBtn: document.getElementById('lbLikeBtn'),
      lbLikeIcon: document.getElementById('lbLikeIcon'),
      lbLikeCount: document.getElementById('lbLikeCount'),
      lbDelBtn: document.getElementById('lbDeleteBtn'),
      lbDlBtn: document.getElementById('lbDownloadBtn'),
      
      // Settings
      setModal: document.getElementById('settingsModal'),
      setEvName: document.getElementById('setEventName'),
      setEvDate: document.getElementById('setEventDate'),
      setSubMsg: document.getElementById('setSubMessage'),
      setTheme: document.getElementById('setThemeColor'),
      setQual: document.getElementById('setQuality'),
      btnSaveSet: document.getElementById('btnSaveSettings'),
      
      // Slideshow
      ssModal: document.getElementById('slideshowModal'),
      ssCont: document.getElementById('slideshowContainer'),
      ssInfo: document.getElementById('slideshowInfo'),
      
      // Toast
      toast: document.getElementById('toastNotification'),
      toastMsg: document.getElementById('toastMessage')
    };

    // --- 初期化フロー ---
    async function initApp() {
      // 1. 認証
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        showDialog("error", "接続エラー", "認証に失敗しました。");
      }

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          // 接続が確立されたらアップロードボタンを有効化する
          els.btnCamera.classList.remove('opacity-50', 'pointer-events-none');
          els.btnLibrary.classList.remove('opacity-50', 'pointer-events-none');
          
          checkGuestName();
          startSync(user);
        } else {
          // 接続が切れたら無効化
          els.btnCamera.classList.add('opacity-50', 'pointer-events-none');
          els.btnLibrary.classList.add('opacity-50', 'pointer-events-none');
        }
      });

      // 外枠のカードボタンをクリックしたとき、中の非表示インプットをトリガーする
      els.btnCamera.addEventListener('click', () => {
        els.camIn.click();
      });
      els.btnLibrary.addEventListener('click', () => {
        els.libIn.click();
      });

      // インプット自身のクリックイベントがバブリングでループするのを防ぐ
      els.camIn.addEventListener('click', (e) => e.stopPropagation());
      els.libIn.addEventListener('click', (e) => e.stopPropagation());

      // ファイルが選択されたらアップロード開始
      els.camIn.addEventListener('change', handleUpload);
      els.libIn.addEventListener('change', handleUpload);
      
      els.sortNew.addEventListener('click', () => setSort('newest'));
      els.sortPop.addEventListener('click', () => setSort('popular'));

      document.getElementById('btnOpenSettings').addEventListener('click', openSettings);
      els.btnSaveSet.addEventListener('click', saveSettingsToFirebase);
      
      document.getElementById('btnStartSlideshow').addEventListener('click', startSlideshow);
      document.getElementById('btnCloseSlideshow').addEventListener('click', stopSlideshow);
      
      document.getElementById('closeLightboxBtn').addEventListener('click', closeLightbox);
      els.lbLikeBtn.addEventListener('click', toggleLikeFromLightbox);
      els.lbDelBtn.addEventListener('click', deleteFromLightbox);
      
      document.getElementById('btnDownloadAll').addEventListener('click', downloadAllImages);
      document.getElementById('btnDeleteAll').addEventListener('click', confirmDeleteAll);
    }

    // --- トースト通知表示処理 ---
    function showToast(message) {
      els.toastMsg.textContent = message;
      // トーストを表示状態にする
      els.toast.classList.remove('translate-y-12', 'opacity-0', 'pointer-events-none');
      els.toast.classList.add('translate-y-0', 'opacity-100');
      
      // 2.5秒後にスッと非表示にする
      setTimeout(() => {
        els.toast.classList.remove('translate-y-0', 'opacity-100');
        els.toast.classList.add('translate-y-12', 'opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // --- ゲスト名管理 ---
    function checkGuestName() {
      if (!guestName) {
        document.getElementById('guestNameModal').classList.remove('hidden');
      } else {
        els.displayGuestName.textContent = guestName;
      }
    }
    
    window.promptGuestName = (force = false) => {
      document.getElementById('inputGuestName').value = guestName;
      document.getElementById('guestNameModal').classList.remove('hidden');
    };

    window.saveGuestName = () => {
      const name = document.getElementById('inputGuestName').value.trim() || 'ゲスト';
      guestName = name;
      localStorage.setItem(`event_${appId}_guestName`, name);
      els.displayGuestName.textContent = name;
      document.getElementById('guestNameModal').classList.add('hidden');
    };

    // --- 同期処理 (RULE 1, RULE 2) ---
    function startSync(user) {
      if (!user) return;
      
      // 設定の同期 (ドキュメントのパスが偶数セグメントとなるよう 'settings' コレクション下の 'config' ドキュメントとして指定)
      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
      onSnapshot(settingsRef, (docSnap) => {
        if (docSnap.exists()) {
          currentSettings = { ...currentSettings, ...docSnap.data() };
          applySettingsToUI();
        } else {
          // 初回デフォルト設定保存
          setDoc(settingsRef, currentSettings);
        }
      });

      // 写真の同期
      const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
      onSnapshot(photosRef, (snapshot) => {
        els.skeleton.classList.add('hidden');
        photoList = [];
        snapshot.forEach((doc) => {
          photoList.push({ id: doc.id, ...doc.data() });
        });
        renderPhotos();
      }, (err) => console.error(err));
    }

    // --- UI反映 ---
    function applySettingsToUI() {
      els.headerName.textContent = currentSettings.eventName;
      els.headerDate.textContent = currentSettings.eventDate;
      els.subMsg.textContent = currentSettings.subMessage;
      
      // テーマカラーの適用
      document.documentElement.style.setProperty('--theme-color', currentSettings.themeColor);
      
      // 暗めの色を計算（Hover等用）
      let hex = currentSettings.themeColor.replace('#', '');
      let r = parseInt(hex.substring(0, 2), 16), g = parseInt(hex.substring(2, 4), 16), b = parseInt(hex.substring(4, 6), 16);
      r = Math.max(0, r - 30); g = Math.max(0, g - 30); b = Math.max(0, b - 30);
      let darkHex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
      document.documentElement.style.setProperty('--theme-color-dark', darkHex);
    }

    // --- ソートと描画 ---
    function setSort(type) {
      currentSort = type;
      if(type === 'newest') {
        els.sortNew.className = "px-3 py-1.5 rounded-md bg-stone-100 font-medium text-stone-800 shadow-sm transition-colors";
        els.sortPop.className = "px-3 py-1.5 rounded-md text-stone-500 hover:text-stone-800 transition-colors flex items-center";
      } else {
        els.sortPop.className = "px-3 py-1.5 rounded-md bg-rose-50 font-medium text-rose-600 shadow-sm transition-colors flex items-center";
        els.sortNew.className = "px-3 py-1.5 rounded-md text-stone-500 hover:text-stone-800 transition-colors";
      }
      renderPhotos();
    }

    function renderPhotos() {
      els.count.textContent = photoList.length;
      if (photoList.length === 0) {
        els.grid.classList.add('hidden');
        els.empty.classList.remove('hidden');
        return;
      }
      els.empty.classList.add('hidden');
      els.grid.classList.remove('hidden');
      els.grid.innerHTML = '';

      // ソート処理 (RULE 2: JS側でソート)
      let sortedPhotos = [...photoList];
      if (currentSort === 'newest') {
        sortedPhotos.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      } else if (currentSort === 'popular') {
        sortedPhotos.sort((a, b) => {
          const aLikes = (a.likedBy || []).length;
          const bLikes = (b.likedBy || []).length;
          return bLikes - aLikes || ((b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        });
      }

      sortedPhotos.forEach(photo => {
        const isLiked = (photo.likedBy || []).includes(currentUser?.uid);
        const likeCount = (photo.likedBy || []).length;
        
        const div = document.createElement('div');
        div.className = "group relative aspect-square bg-stone-100 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 fade-in";
        
        div.innerHTML = `
          <img src="${photo.url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105 cursor-pointer" loading="lazy" />
          
          <!-- オーバーレイ情報 (下部) -->
          <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-3 pt-8 flex justify-between items-end opacity-90 transition-opacity">
            <div class="flex flex-col text-white text-[10px] md:text-xs">
              <span class="font-bold truncate max-w-[100px]"><i class="fa-solid fa-user mr-1 text-theme"></i>${photo.guestName || 'ゲスト'}</span>
            </div>
            
            <button class="like-btn flex items-center space-x-1 ${isLiked ? 'text-rose-500' : 'text-white/70 hover:text-white'} transition-colors z-10" data-id="${photo.id}">
              <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart text-base"></i>
              <span class="text-xs font-bold">${likeCount > 0 ? likeCount : ''}</span>
            </button>
          </div>
        `;
        
        // 画像クリックでライトボックス
        div.querySelector('img').addEventListener('click', () => openLightbox(photo));
        
        // いいねクリック (伝播を止める)
        div.querySelector('.like-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          toggleLike(photo.id);
        });

        els.grid.appendChild(div);
      });
    }

    // --- いいね機能 ---
    async function toggleLike(photoId) {
      if (!currentUser) return;
      const photo = photoList.find(p => p.id === photoId);
      if (!photo) return;
      
      // パスを正しいセグメントに分解して参照
      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photoId);
      const isLiked = (photo.likedBy || []).includes(currentUser.uid);
      
      try {
        if (isLiked) {
          await updateDoc(docRef, { likedBy: arrayRemove(currentUser.uid) });
        } else {
          await updateDoc(docRef, { likedBy: arrayUnion(currentUser.uid) });
        }
      } catch (e) {
        console.error("Like toggle error", e);
      }
    }
    
    function toggleLikeFromLightbox() {
      if(currentLightboxPhotoId) toggleLike(currentLightboxPhotoId);
    }

    // --- 画像を安全なサイズに縮小・圧縮してBase64テキストに変換する関数 ---
    async function compressAndBase64(file, qualitySetting) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            
            // Firestoreドキュメントの1MB制限に完全に収まるようサイズを自動制限（安全第一のアルゴリズム）
            let maxSize = 800; // 標準サイズ
            let quality = 0.6; // 品質圧縮率 (60%)
            
            if (qualitySetting === 1.0) {
              maxSize = 1000; // 高画質
              quality = 0.7;
            } else if (qualitySetting === 0.5) {
              maxSize = 600;  // 低画質
              quality = 0.5;
            }
            
            let width = img.width;
            let height = img.height;
            
            if (width > height && width > maxSize) {
              height *= maxSize / width;
              width = maxSize;
            } else if (height > maxSize) {
              width *= maxSize / height;
              height = maxSize;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // JPEGデータ形式で高圧縮のBase64を生成
            const base64Url = canvas.toDataURL('image/jpeg', quality);
            resolve(base64Url);
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    }

    async function handleUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      // RULE 3: クエリ・操作の直前に認証状態を確認、なければその場でログインを再試行する
      let user = auth.currentUser || currentUser;
      if (!user) {
        try {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            const res = await signInWithCustomToken(auth, __initial_auth_token);
            user = res.user;
          } else {
            const res = await signInAnonymously(auth);
            user = res.user;
          }
          currentUser = user;
        } catch (authErr) {
          console.error("Upload auth recover error:", authErr);
          return showDialog("error", "エラー", "ログインセッションの確立に失敗しました。もう一度お試しください。");
        }
      }

      els.progCont.classList.remove('hidden');
      els.progBar.style.width = '30%';
      els.progPct.textContent = '圧縮処理中...';

      try {
        // 画像を自動圧縮した上でBase64データURLを生成
        const base64Data = await compressAndBase64(file, currentSettings.uploadQuality);
        
        els.progBar.style.width = '75%';
        els.progPct.textContent = 'アルバムに直接保存中...';

        // カンマ区切りの安全なセグメント参照(RULE 1)でFirestoreに追加
        const photosCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
        await addDoc(photosCollectionRef, {
          url: base64Data, // 圧縮したBase64データを直接データベースに保存
          userId: user.uid,
          guestName: guestName || 'ゲスト',
          createdAt: new Date(),
          likedBy: []
        });
        
        els.camIn.value = '';
        els.libIn.value = '';
        els.progBar.style.width = '100%';
        els.progPct.textContent = '完了！';
        
        // ポップアップダイアログを出さず、プログレスバーを隠してトースト通知を表示する
        setTimeout(() => {
          els.progCont.classList.add('hidden');
          showToast("写真をアルバムに投稿しました！");
        }, 1000);

      } catch (err) {
        console.error("Upload process error:", err);
        els.progCont.classList.add('hidden');
        showDialog("error", "エラー", "画像の登録に失敗しました。お手数ですがファイル形式を確認して再度お試しください。");
      }
    }

    // --- ライトボックス ---
    function openLightbox(photo) {
      currentLightboxPhotoId = photo.id;
      currentLightboxPhoto = photo;
      els.lbImg.src = photo.url;
      
      const dateStr = photo.createdAt ? new Date(photo.createdAt.seconds * 1000).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
      els.lbTime.textContent = dateStr;
      els.lbGuest.innerHTML = `<i class="fa-solid fa-camera mr-1"></i>${photo.guestName || 'ゲスト'}さんが撮影`;
      
      // いいね状態更新
      updateLightboxLikeUI();
      
      // ダウンロードリンク
      els.lbDlBtn.href = photo.url;

      els.lb.classList.remove('hidden');
      els.lb.classList.add('flex');
      document.body.style.overflow = 'hidden';
      
      // いいねのリアルタイム反映のためにインターバル監視（簡易的）
      window.lbUpdateInterval = setInterval(updateLightboxLikeUI, 1000);
    }
    
    function updateLightboxLikeUI() {
      if(!currentLightboxPhotoId) return;
      const p = photoList.find(x => x.id === currentLightboxPhotoId);
      if(!p) return closeLightbox();
      
      const isLiked = (p.likedBy || []).includes(currentUser?.uid);
      const count = (p.likedBy || []).length;
      
      els.lbLikeIcon.className = `${isLiked ? 'fa-solid text-rose-500 scale-110' : 'fa-regular'} fa-heart text-2xl mb-1 transition-transform`;
      els.lbLikeCount.textContent = count > 0 ? count : 'いいね';
    }

    function closeLightbox() {
      clearInterval(window.lbUpdateInterval);
      els.lb.classList.add('hidden');
      els.lb.classList.remove('flex');
      document.body.style.overflow = '';
      currentLightboxPhotoId = null;
      currentLightboxPhoto = null;
    }

    // ライトボックスから写真を削除する処理
    function deleteFromLightbox() {
      if (currentLightboxPhoto) {
        confirmDeletePhoto(currentLightboxPhoto);
      }
    }

    // --- 削除処理 ---
    function confirmDeletePhoto(photo) {
      showDialog("warning", "写真の削除", "この写真をアルバムから完全に削除しますか？", [
        { label: "キャンセル", class: "bg-stone-200 text-stone-800", action: closeDialog },
        { label: "削除する", class: "bg-red-500 text-white", action: () => { executeDelete(photo); closeDialog(); } }
      ]);
    }

    async function executeDelete(photo) {
      if(!photo || !photo.id) return;
      try {
        closeLightbox();
        // Storageのファイル削除は不要になったため、Firestoreのみを削除
        const photoDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id);
        await deleteDoc(photoDocRef);
        showToast("写真を削除しました");
      } catch (err) {
        console.error(err);
        showDialog("error", "削除エラー", "削除に失敗しました。");
      }
    }

    // --- 設定モーダル ---
    window.openSettings = () => {
      els.setEvName.value = currentSettings.eventName;
      els.setEvDate.value = currentSettings.eventDate;
      els.setSubMsg.value = currentSettings.subMessage;
      els.setTheme.value = currentSettings.themeColor;
      els.setQual.value = currentSettings.uploadQuality;
      
      els.setModal.classList.remove('hidden');
    };
    
    window.closeSettings = () => els.setModal.classList.add('hidden');
    
    async function saveSettingsToFirebase() {
      const newSettings = {
        eventName: els.setEvName.value.trim() || "Share Gallery",
        eventDate: els.setEvDate.value.trim(),
        subMessage: els.setSubMsg.value.trim(),
        themeColor: els.setTheme.value,
        uploadQuality: parseFloat(els.setQual.value)
      };
      
      els.btnSaveSet.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 保存中...';
      try {
        // ドキュメントのパスが偶数セグメントとなるよう 'settings' コレクション下の 'config' ドキュメントとして指定
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), newSettings);
        setTimeout(() => {
          els.btnSaveSet.innerHTML = '反映完了！';
          setTimeout(() => {
            els.btnSaveSet.innerHTML = '設定を全体に反映する';
            closeSettings();
            showToast("イベント設定を全体に適用しました");
          }, 1000);
        }, 500);
      } catch (e) {
        showDialog("error", "保存失敗", "設定の保存に失敗しました。");
        els.btnSaveSet.innerHTML = '設定を全体に反映する';
      }
    }

    // --- スライドショー ---
    function startSlideshow() {
      if (photoList.length === 0) return showDialog("warning", "写真がありません", "スライドショーを開始するには写真をアップロードしてください。");
      
      els.ssModal.classList.remove('hidden');
      els.ssModal.classList.add('flex');
      
      // 全画面化を試みる
      if(els.ssModal.requestFullscreen) els.ssModal.requestFullscreen().catch(()=>{});
      
      let index = 0;
      
      const showNext = () => {
        if(photoList.length === 0) return stopSlideshow();
        if(index >= photoList.length) index = 0;
        
        const photo = photoList[index];
        els.ssCont.innerHTML = `<img src="${photo.url}" class="max-h-screen max-w-full object-contain slide-fade shadow-2xl rounded-sm" />`;
        els.ssInfo.innerHTML = `<i class="fa-solid fa-camera mr-2"></i>${photo.guestName || 'ゲスト'} <span class="mx-2">|</span> <i class="fa-solid fa-heart text-rose-400 mr-1"></i>${(photo.likedBy||[]).length}`;
        
        index++;
      };
      
      showNext();
      slideshowInterval = setInterval(showNext, 5000); // 5秒間隔
    }
    
    function stopSlideshow() {
      clearInterval(slideshowInterval);
      els.ssModal.classList.add('hidden');
      els.ssModal.classList.remove('flex');
      els.ssCont.innerHTML = '';
      if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    }

    // --- 管理者機能: 一括保存 (JSZip) ---
    async function downloadAllImages() {
      if (photoList.length === 0) return showDialog("warning", "画像なし", "保存する画像がありません。");
      
      const btn = document.getElementById('btnDownloadAll');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span><i class="fa-solid fa-spinner animate-spin mr-2"></i>ZIP作成中...お待ちください</span>';
      btn.disabled = true;

      try {
        const zip = new JSZip();
        const folder = zip.folder("SharedGallery_Photos");
        
        let successCount = 0;
        for (let i = 0; i < photoList.length; i++) {
          try {
            const url = photoList[i].url;
            if (url.startsWith('data:image/')) {
              // Base64データから純粋なバイナリ文字列の部分のみを切り出し
              const parts = url.split(',');
              const mimeType = parts[0].match(/:(.*?);/)[1];
              const ext = mimeType.split('/')[1] || 'jpg';
              const base64Data = parts[1];
              
              const name = `${photoList[i].guestName || 'guest'}_${i+1}.${ext}`;
              folder.file(name, base64Data, {base64: true});
              successCount++;
            }
          } catch(e) {
            console.warn("Failed to add image to zip", e);
          }
        }
        
        if(successCount === 0) throw new Error("No images could be zipped");

        const zipBlob = await zip.generateAsync({type:"blob"});
        const downloadUrl = URL.createObjectURL(zipBlob);
        
        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = `${currentSettings.eventName || 'event'}_photos.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(downloadUrl);
        
        showToast(`${successCount}枚の画像を一括ダウンロードしました`);
      } catch (err) {
        console.error("Zip generation error:", err);
        showDialog("warning", "ダウンロードエラー", "ZIPファイルの作成中にエラーが発生しました。");
      } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
        closeSettings();
      }
    }

    // --- 管理者機能: 一括削除 ---
    function confirmDeleteAll() {
      showDialog("warning", "🚨 全画像一括削除 🚨", "サーバー上のすべての画像とデータを完全に削除します。元には戻せません。本当によろしいですか？", [
        { label: "キャンセル", class: "bg-stone-200 text-stone-800", action: closeDialog },
        { label: "すべて削除する", class: "bg-red-600 text-white font-bold", action: () => { executeDeleteAll(); closeDialog(); } }
      ]);
    }

    async function executeDeleteAll() {
      const btn = document.getElementById('btnDeleteAll');
      btn.innerHTML = '<span><i class="fa-solid fa-spinner animate-spin mr-2"></i>削除中...</span>';
      btn.disabled = true;

      try {
        const deletePromises = photoList.map(async (photo) => {
          // パスを正しいセグメント引数に分解
          const photoDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id);
          await deleteDoc(photoDocRef);
        });
        
        await Promise.all(deletePromises);
        closeSettings();
        showToast("すべての写真を削除しました");
      } catch (err) {
        console.error("Delete All error:", err);
        showDialog("error", "削除エラー", "一部の画像の削除に失敗しました。");
      } finally {
        btn.innerHTML = '<span><i class="fa-solid fa-triangle-exclamation mr-2"></i>全画像をサーバーから削除</span>';
        btn.disabled = false;
      }
    }

    // --- ダイアログ制御 ---
    window.showDialog = function(type, title, message, buttons = null) {
      const dialog = document.getElementById('customDialog');
      document.getElementById('dialogTitle').textContent = title;
      document.getElementById('dialogMessage').textContent = message;

      const icon = document.getElementById('dialogIcon');
      if (type === "success") icon.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-500"></i>`;
      else if (type === "warning") icon.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-amber-500"></i>`;
      else icon.innerHTML = `<i class="fa-solid fa-circle-exclamation text-rose-500"></i>`;

      const actions = document.getElementById('dialogActions');
      actions.innerHTML = '';
      if (buttons && buttons.length > 0) {
        buttons.forEach(btnInfo => {
          const btn = document.createElement('button');
          btn.className = `px-6 py-2.5 rounded-full text-sm font-medium transition-all ${btnInfo.class}`;
          btn.textContent = btnInfo.label;
          btn.onclick = btnInfo.action;
          actions.appendChild(btn);
        });
      } else {
        const btn = document.createElement('button');
        btn.className = "bg-stone-900 hover:bg-stone-800 text-white px-8 py-2.5 rounded-full text-sm font-medium transition-all";
        btn.textContent = "閉じる";
        btn.onclick = window.closeDialog;
        actions.appendChild(btn);
      }

      dialog.classList.remove('hidden');
    }

    window.closeDialog = function() {
      document.getElementById('customDialog').classList.add('hidden');
    }

    // アプリ起動
    initApp();

  </script>
