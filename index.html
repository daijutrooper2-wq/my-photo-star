<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Snap</title>
  <!-- Tailwind CSS (スタイリング用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- JSZip (一括ダウンロード用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Google Fonts (フォント) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
    }
    .font-serif {
      font-family: 'Playfair Display', 'Noto Sans JP', serif;
    }
  </style>
</head>
<body class="min-h-screen bg-rose-50 text-gray-800 transition-colors duration-300 pb-36">

  <!-- ヘッダー -->
  <header class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md shadow-sm z-40 transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex flex-col justify-center min-w-0">
        <div class="flex items-center gap-2">
          <!-- キラキラアイコン (SVG) -->
          <svg class="w-5 h-5 text-rose-600 theme-text-color transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
          </svg>
          <h1 id="app-title" class="text-lg font-bold tracking-wide truncate max-w-[150px] sm:max-w-[260px]">Wedding Snap</h1>
        </div>
        <span id="wedding-date-badge" class="text-[10px] text-gray-400 font-bold flex items-center gap-1 mt-0.5 hidden">
          <!-- カレンダーアイコン -->
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          <span id="wedding-date-text"></span>
        </span>
      </div>
      
      <div class="flex items-center gap-2">
        <!-- ユーザーネーム登録ボタン -->
        <button id="btn-edit-name" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 transition-all">
          <!-- ユーザーアイコン -->
          <svg class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          <span id="current-username" class="max-w-[80px] truncate">名前登録</span>
        </button>

        <!-- スライドショー起動ボタン -->
        <button id="btn-start-slideshow" class="hidden flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-semibold text-white bg-rose-500 hover:bg-rose-600 theme-btn transition-colors">
          <!-- 再生アイコン -->
          <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          スライドショー
        </button>

        <!-- 設定ボタン -->
        <button id="btn-open-settings" class="p-2 text-gray-500 hover:text-rose-600 theme-text-hover transition-colors bg-gray-100 rounded-full">
          <!-- 歯車アイコン -->
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- お知らせメッセージ (トースト) -->
  <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md hidden">
    <div id="toast-box" class="bg-emerald-600 text-white px-4 py-3 rounded-xl shadow-lg flex items-center justify-between">
      <span id="toast-text" class="text-sm font-semibold">メッセージ</span>
      <button onclick="hideToast()" class="text-white hover:opacity-80">
        <!-- 閉じるアイコン -->
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </div>

  <!-- メインエリア -->
  <main class="max-w-4xl mx-auto pt-24 px-4">
    
    <!-- ウェルカムメッセージパネル -->
    <div id="welcome-panel" class="mb-6 bg-white/80 border border-white p-5 rounded-2xl shadow-sm text-center hidden">
      <!-- 吹き出しアイコン -->
      <svg class="w-6 h-6 mx-auto mb-2 text-rose-600 theme-text-color opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
      <p id="welcome-text" class="text-gray-700 text-sm font-medium leading-relaxed whitespace-pre-wrap">ウェルカムメッセージ</p>
    </div>

    <!-- 並び替えセレクター -->
    <div id="sort-selector-panel" class="flex items-center justify-between mb-6 bg-white p-2 rounded-xl shadow-sm border border-gray-100 hidden">
      <div class="flex items-center gap-2 text-xs text-gray-500 pl-2">
        <!-- フィルターアイコン -->
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
        <span>並べ替え:</span>
      </div>
      <div class="flex gap-1">
        <button id="sort-date" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-rose-500 text-white theme-btn transition-all">新着順</button>
        <button id="sort-popular" class="px-3 py-1.5 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition-all">人気順 (♡順)</button>
      </div>
    </div>

    <!-- 写真一覧表示エリア -->
    <div id="empty-state" class="flex flex-col items-center justify-center h-80 text-gray-400 bg-white/60 rounded-3xl border border-dashed border-gray-300 p-8">
      <!-- プレースホルダーアイコン -->
      <svg class="w-16 h-16 mb-4 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      <h3 class="text-base font-bold text-gray-700 mb-1">まだ写真がありません</h3>
      <p class="text-center text-xs text-gray-500 max-w-xs leading-relaxed">下のボタンから思い出の詰まった素敵な1枚を投稿しましょう！</p>
    </div>

    <!-- Masonry風ギャラリー -->
    <div id="photo-gallery" class="columns-2 md:columns-3 gap-4 space-y-4"></div>

    <!-- 「もっと見る」ボタン -->
    <div id="load-more-container" class="text-center mt-10 hidden">
      <button id="btn-load-more" class="px-6 py-2.5 rounded-full text-xs font-bold text-white bg-rose-500 hover:bg-rose-600 theme-btn shadow-md transition-all">
        さらに写真を表示する
      </button>
    </div>
  </main>

  <!-- 下部固定アップロードパネル -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 bg-white/95 backdrop-blur-md px-8 py-3 rounded-full shadow-2xl border border-gray-100 flex items-center gap-10 transition-all duration-300">
    <!-- アルバムボタン -->
    <div class="flex flex-col items-center">
      <label class="flex items-center justify-center w-12 h-12 rounded-full cursor-pointer bg-gray-100 hover:scale-105 active:scale-95 hover:bg-gray-200 transition-all duration-300">
        <input id="input-album" type="file" accept="image/*" class="hidden">
        <svg class="w-5 h-5 text-rose-500 theme-text-color" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      </label>
      <span class="text-[10px] font-extrabold text-gray-500 mt-1">アルバム</span>
    </div>

    <!-- カメラボタン -->
    <div class="flex flex-col items-center">
      <label class="flex items-center justify-center w-16 h-16 rounded-full cursor-pointer bg-rose-500 hover:bg-rose-600 theme-btn hover:scale-105 active:scale-95 shadow-lg transition-all duration-300">
        <input id="input-camera" type="file" accept="image/*" capture="environment" class="hidden">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      </label>
      <span class="text-[10px] font-extrabold text-gray-700 mt-1">カメラ撮影</span>
    </div>
  </div>

  <!-- アップロード状況オーバーレイ -->
  <div id="upload-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-xs z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-xs w-full text-center shadow-xl">
      <div class="w-8 h-8 border-4 border-rose-500 border-t-transparent rounded-full animate-spin mx-auto mb-3 theme-spinner"></div>
      <p id="upload-status-text" class="text-sm font-bold text-gray-700">画像を送信中...</p>
    </div>
  </div>

  <!-- モーダル: 名前登録 -->
  <div id="modal-name" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
      <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2 mb-2">
        <svg class="w-5 h-5 text-rose-500 theme-text-color" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        お名前の登録
      </h2>
      <p class="text-xs text-gray-500 mb-6 leading-relaxed">
        あなたがアップロードした写真に登録したお名前が表示されます。いつでも変更できます。
      </p>
      <div class="space-y-4">
        <input id="input-username-field" type="text" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-300 theme-ring transition-shadow text-sm" placeholder="例: たろう / 花子の友人" maxlength="15">
        <button id="btn-save-name" class="w-full py-3 rounded-xl text-white font-bold bg-rose-500 hover:bg-rose-600 theme-btn transition-all text-sm">決定してはじめる</button>
      </div>
    </div>
  </div>

  <!-- モーダル: サイト管理・設定 -->
  <div id="modal-settings" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md relative shadow-2xl overflow-y-auto max-h-[90vh]">
      <button onclick="closeModal('modal-settings')" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-800 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
      
      <h2 class="text-lg font-extrabold text-gray-800 flex items-center gap-2 mb-6">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        サイト管理・設定
      </h2>
      
      <div class="space-y-5">
        <!-- タイトル設定 -->
        <div>
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">サイトの題名</label>
          <input id="setting-title" type="text" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-300 theme-ring transition-shadow text-sm" placeholder="Wedding Day" maxlength="30">
        </div>

        <!-- 日付設定 -->
        <div>
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">式・イベントの日付</label>
          <input id="setting-date" type="date" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-300 theme-ring transition-shadow text-sm">
        </div>

        <!-- ウェルカムメッセージ変更 -->
        <div>
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">ウェルカムメッセージ</label>
          <textarea id="setting-welcome" rows="3" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-300 theme-ring transition-shadow text-sm resize-none" placeholder="ゲストへの感謝の言葉などを入力してください..." maxlength="150"></textarea>
        </div>

        <!-- 画質設定 -->
        <div>
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">アップロード画質設定</label>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="setQuality('standard')" id="quality-standard" class="flex flex-col items-center justify-center p-2 rounded-xl border border-gray-200 text-center bg-white text-gray-700">
              <span class="text-xs font-bold">標準</span>
              <span class="text-[9px] text-gray-400">軽量・推奨</span>
            </button>
            <button onclick="setQuality('high')" id="quality-high" class="flex flex-col items-center justify-center p-2 rounded-xl border border-rose-500 text-center bg-rose-500 text-white theme-btn">
              <span class="text-xs font-bold">高画質</span>
              <span class="text-[9px] opacity-80">標準画質</span>
            </button>
            <button onclick="setQuality('max')" id="quality-max" class="flex flex-col items-center justify-center p-2 rounded-xl border border-gray-200 text-center bg-white text-gray-700">
              <span class="text-xs font-bold">最高画質</span>
              <span class="text-[9px] text-gray-400">最大サイズ</span>
            </button>
          </div>
        </div>

        <!-- テーマカラー選択 -->
        <div>
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">テーマカラー</label>
          <div id="theme-selectors" class="flex flex-wrap gap-2.5"></div>
        </div>

        <!-- 写真の管理セクション -->
        <div class="border-t border-gray-100 pt-5 space-y-4">
          <label class="block text-xs font-extrabold text-gray-500 uppercase tracking-wider">写真の管理</label>
          <div class="grid grid-cols-2 gap-3">
            <button id="btn-bulk-download" class="flex items-center justify-center gap-2 px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl text-gray-700 font-bold text-xs transition-colors">
              <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              一括ダウンロード
            </button>
            <button id="btn-bulk-delete" class="flex items-center justify-center gap-2 px-4 py-3 bg-red-50 hover:bg-red-100 rounded-xl text-red-600 font-bold text-xs transition-colors">
              <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              全写真を削除
            </button>
          </div>
        </div>
      </div>
      
      <div class="mt-8">
        <button onclick="closeModal('modal-settings')" class="w-full py-3 rounded-xl text-white font-bold bg-rose-500 hover:bg-rose-600 theme-btn transition-colors text-sm">設定を閉じる</button>
      </div>
    </div>
  </div>

  <!-- モーダル: 1枚の写真拡大プレビュー -->
  <div id="modal-preview" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex flex-col justify-between p-4 hidden">
    <div class="flex items-center justify-between text-white py-2 w-full max-w-4xl mx-auto">
      <div class="flex flex-col">
        <span class="text-[10px] text-gray-400 font-bold tracking-wider uppercase">uploader</span>
        <span id="preview-uploader" class="text-sm font-bold text-white">ゲスト</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-preview-download" class="p-2 bg-white/10 hover:bg-white/20 text-white rounded-full transition-all">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
        </button>
        <button id="btn-preview-delete" class="p-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded-full transition-all">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </button>
        <button onclick="closeModal('modal-preview')" class="p-2 bg-white/10 hover:bg-white/20 text-white rounded-full transition-all">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
    </div>
    <div class="flex-1 flex items-center justify-center max-w-4xl mx-auto w-full">
      <img id="preview-img" src="" alt="Large Snapshot" class="max-w-full max-h-[75vh] object-contain rounded-2xl shadow-2xl">
    </div>
    <div class="flex justify-center items-center py-4">
      <button id="btn-preview-like" class="flex items-center gap-2 px-6 py-3 rounded-full bg-white/15 hover:bg-white/25 active:scale-95 transition-all text-white border border-white/10">
        <svg id="preview-like-heart" class="w-6 h-6 transition-colors text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        <span id="preview-like-text" class="text-sm font-bold">お気に入り (0人)</span>
      </button>
    </div>
  </div>

  <!-- 確認ダイアログ (一括/個別削除用) -->
  <div id="modal-confirm" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
      <h3 id="confirm-title" class="text-base font-extrabold text-gray-800 mb-2">本当に行いますか？</h3>
      <p id="confirm-desc" class="text-xs text-gray-500 mb-6 leading-relaxed">この操作は元に戻せません。</p>
      <div class="flex gap-3">
        <button onclick="closeModal('modal-confirm')" class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl text-xs transition-colors">キャンセル</button>

      </div>
    </div>
  </div>


  <!-- Firebase 11.6.1 CDNから読み込み -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, collection, onSnapshot, addDoc, setDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Web App Configuration ---
    // GitHub等に安全にアップロードできるように、コンパイラの警告を完全に回避した形で読み込みます
    const getFirebaseConfig = () => {
      // プレビュー表示用
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        return JSON.parse(__firebase_config);
      }
      
      // 動的解析により esbuild やコンパイルターゲット (es2015) などの警告を回避
      let env = {};
      try {
        const getMetaEnv = new Function('try { return import.meta.env; } catch(e) { return null; }');
        env = getMetaEnv() || {};
      } catch (e) {
        if (typeof process !== 'undefined' && process?.env) {
          env = process.env;
        }
      }
      
      // ==========================================
      // 【本番環境用】Firebase config に書き換えてください
      // ==========================================
      return {
        apiKey: env.VITE_FIREBASE_API_KEY || "YOUR_API_KEY_HERE",
        authDomain: env.VITE_FIREBASE_AUTH_DOMAIN || "YOUR_PROJECT_ID_HERE.firebaseapp.com",
        projectId: env.VITE_FIREBASE_PROJECT_ID || "YOUR_PROJECT_ID_HERE",
        storageBucket: env.VITE_FIREBASE_STORAGE_BUCKET || "YOUR_PROJECT_ID_HERE.appspot.com",
        messagingSenderId: env.VITE_FIREBASE_MESSAGING_SENDER_ID || "YOUR_SENDER_ID_HERE",
        appId: env.VITE_FIREBASE_APP_ID || "YOUR_APP_ID_HERE"
      };
    };

    const firebaseConfig = getFirebaseConfig();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-snap-app';

    // --- State & App Variables ---
    const THEMES = {
      rose: { hex: '#f43f5e', bg: 'bg-rose-50', text: 'text-rose-600', fill: 'fill-rose-500', button: 'bg-rose-500 hover:bg-rose-600', border: 'border-rose-100', accent: 'rose', ring: 'focus:ring-rose-300' },
      blue: { hex: '#3b82f6', bg: 'bg-blue-50', text: 'text-blue-600', fill: 'fill-blue-500', button: 'bg-blue-500 hover:bg-blue-600', border: 'border-blue-100', accent: 'blue', ring: 'focus:ring-blue-300' },
      emerald: { hex: '#10b981', bg: 'bg-emerald-50', text: 'text-emerald-600', fill: 'fill-emerald-500', button: 'bg-emerald-500 hover:bg-emerald-600', border: 'border-emerald-100', accent: 'emerald', ring: 'focus:ring-emerald-300' },
      amber: { hex: '#f59e0b', bg: 'bg-amber-50', text: 'text-amber-600', fill: 'fill-amber-500', button: 'bg-amber-500 hover:bg-amber-600', border: 'border-amber-100', accent: 'amber', ring: 'focus:ring-amber-300' },
      slate: { hex: '#64748b', bg: 'bg-slate-50', text: 'text-slate-600', fill: 'fill-slate-500', button: 'bg-slate-500 hover:bg-slate-600', border: 'border-slate-100', accent: 'slate', ring: 'focus:ring-slate-300' }
    };

    let user = null;
    let photos = [];
    let appSettings = { 
      title: "Wedding Snap", 
      theme: "rose", 
      weddingDate: "", 
      uploadQuality: "high", 
      welcomeMessage: "本日はご列席いただきありがとうございます！思い出の写真をシェアしてください。" 
    };
    let userName = "";
    let sortBy = "date";
    let visibleCount = 24;
    let isUploading = false;

    // スライドショー関係
    let slideshowTimer = null;
    let slideshowIndex = 0;
    let slideshowPlaying = true;

    // モーダル・プレビュー中の選択写真
    let selectedPhoto = null;

    // データベース接続監視のキャンセラー
    let unsubscribeSettings = null;
    let unsubscribePhotos = null;

    // --- DOM Elements ---
    const appTitleEl = document.getElementById("app-title");
    const weddingDateBadgeEl = document.getElementById("wedding-date-badge");
    const weddingDateTextEl = document.getElementById("wedding-date-text");
    const welcomePanelEl = document.getElementById("welcome-panel");
    const welcomeTextEl = document.getElementById("welcome-text");
    const currentUsernameEl = document.getElementById("current-username");
    const photoGalleryEl = document.getElementById("photo-gallery");
    const emptyStateEl = document.getElementById("empty-state");
    const sortSelectorPanelEl = document.getElementById("sort-selector-panel");
    const loadMoreContainerEl = document.getElementById("load-more-container");
    const btnLoadMoreEl = document.getElementById("btn-load-more");
    
    // アップロード
    const inputAlbumEl = document.getElementById("input-album");
    const inputCameraEl = document.getElementById("input-camera");
    const uploadOverlayEl = document.getElementById("upload-overlay");
    const uploadStatusTextEl = document.getElementById("upload-status-text");

    // 設定フォーム
    const settingTitleEl = document.getElementById("setting-title");
    const settingDateEl = document.getElementById("setting-date");
    const settingWelcomeEl = document.getElementById("setting-welcome");

    // スライドショー
    const modalSlideshowEl = document.getElementById("modal-slideshow");
    const slideshowImgEl = document.getElementById("slideshow-img");
    const slideshowUploaderEl = document.getElementById("slideshow-uploader");
    const slideshowCounterEl = document.getElementById("slideshow-counter");
    const btnSlideshowToggleEl = document.getElementById("btn-slideshow-toggle");
    const slideshowPlayIconEl = document.getElementById("slideshow-play-icon");

    // 画像プレビュー
    const modalPreviewEl = document.getElementById("modal-preview");
    const previewImgEl = document.getElementById("preview-img");
    const previewUploaderEl = document.getElementById("preview-uploader");
    const previewLikeTextEl = document.getElementById("preview-like-text");
    const previewLikeHeartEl = document.getElementById("preview-like-heart");

    // --- Init Web app ---
    window.addEventListener("DOMContentLoaded", () => {
      initLocalUsername();
      setupEventListeners();
      initAuthentication();
    });

    // 1. Firebase Authentication (RULE 3 - CustomTokenまたは匿名サインインを完全に解決した後にのみFirestoreにアクセス)
    const initAuthentication = async () => {
      try {
        // バックグラウンドで状態監視を安全に動作させる
        onAuthStateChanged(auth, (currentUser) => {
          user = currentUser;
          if (user) {
            // 完全にトークンが確立・認識されたら、多重登録を防ぎつつリスナーを起動
            if (!unsubscribeSettings && !unsubscribePhotos) {
              listenSettings();
              listenPhotos();
            }
          } else {
            // ログアウト、または認証未完了時は古い監視を解除する
            if (unsubscribeSettings) { unsubscribeSettings(); unsubscribeSettings = null; }
            if (unsubscribePhotos) { unsubscribePhotos(); unsubscribePhotos = null; }
          }
        });

        // 開発・テスト環境下で認証が正しく実行されるように __initial_auth_token の有無を確認・待機する
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth Error:", err);
        showToast("サーバー接続エラー。再読み込みしてください。", true);
      }
    };

    // 2. ユーザー登録名の初期読み込み
    const initLocalUsername = () => {
      const savedName = localStorage.getItem("wedding_uploader_name");
      if (savedName) {
        userName = savedName;
        currentUsernameEl.textContent = userName;
      } else {
        openModal("modal-name");
      }
    };

    // 3. 設定データのリアルタイム受信
    const listenSettings = () => {
      if (!user) return;
      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');
      unsubscribeSettings = onSnapshot(settingsRef, (docSnap) => {
        if (docSnap.exists()) {
          appSettings = { ...appSettings, ...docSnap.data() };
        }
        applySettingsUI();
      }, (err) => {
        console.error("Settings Fetch Error:", err);
      });
    };

    // 4. 写真一覧のリアルタイム受信
    const listenPhotos = () => {
      if (!user) return;
      const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
      unsubscribePhotos = onSnapshot(photosRef, (snapshot) => {
        photos = [];
        snapshot.forEach((doc) => {
          photos.push({ id: doc.id, ...doc.data() });
        });
        
        // プレビュー中のデータもリアルタイム更新
        if (selectedPhoto) {
          const updated = photos.find(p => p.id === selectedPhoto.id);
          if (updated) {
            selectedPhoto = updated;
            updatePreviewModalUI();
          }
        }
        renderGallery();
      }, (err) => {
        console.error("Firestore Error:", err);
        showToast("データの更新権限エラーまたは接続エラー", true);
      });
    };

    // 5. 設定を画面に適用する
    const applySettingsUI = () => {
      appTitleEl.textContent = appSettings.title || "Wedding Snap";
      document.title = appSettings.title || "Wedding Snap";

      // 日付
      if (appSettings.weddingDate) {
        weddingDateTextEl.textContent = appSettings.weddingDate;
        weddingDateBadgeEl.classList.remove("hidden");
      } else {
        weddingDateBadgeEl.classList.add("hidden");
      }

      // ウェルカムメッセージ
      if (appSettings.welcomeMessage) {
        welcomeTextEl.textContent = appSettings.welcomeMessage;
        welcomePanelEl.classList.remove("hidden");
      } else {
        welcomePanelEl.classList.add("hidden");
      }

      // 各インプットの同期（フォーカス中でない時のみ）
      if (document.activeElement !== settingTitleEl) settingTitleEl.value = appSettings.title || "";
      if (document.activeElement !== settingDateEl) settingDateEl.value = appSettings.weddingDate || "";
      if (document.activeElement !== settingWelcomeEl) settingWelcomeEl.value = appSettings.welcomeMessage || "";

      // テーマ適用
      applyTheme(appSettings.theme);
    };

    // テーマカラースタイルの書き換え
    const applyTheme = (themeName) => {
      const theme = THEMES[themeName] || THEMES.rose;
      
      // 背景色変更
      document.body.className = `min-h-screen ${theme.bg} text-gray-800 transition-colors duration-300 pb-36`;

      // 設定ダイアログの「画質」選択部分をアップデート
      document.querySelectorAll(".theme-btn").forEach(el => {
        el.className = el.className.replace(/bg-\w+-500/g, `bg-${theme.accent}-500`).replace(/hover:bg-\w+-600/g, `hover:bg-${theme.accent}-600`);
      });

      // テーマ固有クラスの変更処理
      const textColors = document.querySelectorAll(".theme-text-color");
      textColors.forEach(el => {
        el.style.color = theme.hex;
      });

      // スライドショーのボタン
      const btnSlideshow = document.getElementById("btn-start-slideshow");
      btnSlideshow.className = `flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-semibold text-white ${theme.button} transition-colors`;
      
      // カメラボタン
      const btnCamera = inputCameraEl.closest("label");
      btnCamera.className = `flex items-center justify-center w-16 h-16 rounded-full cursor-pointer ${theme.button} hover:scale-105 active:scale-95 shadow-lg transition-all duration-300`;
      
      // 画質設定のアクティブなボタンカラー
      updateQualityUI(appSettings.uploadQuality, theme);
    };

    // 6. ギャラリー（写真タイル）の描写
    const renderGallery = () => {
      photoGalleryEl.innerHTML = "";
      
      if (photos.length === 0) {
        emptyStateEl.classList.remove("hidden");
        sortSelectorPanelEl.classList.add("hidden");
        loadMoreContainerEl.classList.add("hidden");
        document.getElementById("btn-start-slideshow").classList.add("hidden");
        return;
      }

      emptyStateEl.classList.add("hidden");
      sortSelectorPanelEl.classList.remove("hidden");
      document.getElementById("btn-start-slideshow").classList.remove("hidden");

      // 並べ替え処理
      const sorted = [...photos];
      if (sortBy === "popular") {
        sorted.sort((a, b) => {
          const likesA = (a.likedBy || []).length;
          const likesB = (b.likedBy || []).length;
          if (likesB !== likesA) return likesB - likesA;
          return b.timestamp - a.timestamp;
        });
      } else {
        sorted.sort((a, b) => b.timestamp - a.timestamp);
      }

      // 表示枚数制限
      const displayPhotos = sorted.slice(0, visibleCount);

      if (sorted.length > visibleCount) {
        loadMoreContainerEl.classList.remove("hidden");
        btnLoadMoreEl.textContent = `さらに写真を表示する (${sorted.length - visibleCount}枚あり)`;
      } else {
        loadMoreContainerEl.classList.add("hidden");
      }

      const theme = THEMES[appSettings.theme] || THEMES.rose;

      displayPhotos.forEach(photo => {
        const likedBy = photo.likedBy || [];
        const hasLiked = user ? likedBy.includes(user.uid) : false;

        const card = document.createElement("div");
        card.className = `break-inside-avoid bg-white p-2 rounded-2xl shadow-sm border ${theme.border} group relative animate-in fade-in zoom-in-95 duration-300 mb-4`;
        
        card.innerHTML = `
          <!-- 写真 -->
          <div class="relative overflow-hidden rounded-xl bg-gray-50 cursor-pointer img-click-area">
            <img src="${photo.imageUrl}" alt="Snapshot" class="w-full h-auto object-cover max-h-[350px] rounded-xl group-hover:scale-[1.02] transition-transform duration-300" loading="lazy">
            
            <!-- 保存 / 削除 オーバーレイ -->
            <div class="absolute top-2 right-2 flex gap-1.5 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity overlay-buttons">
              <button class="btn-single-download p-1.5 bg-white/95 text-gray-700 hover:text-black rounded-lg shadow-sm transition-all active:scale-95" title="画像を保存">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              </button>
              <button class="btn-single-delete p-1.5 bg-white/95 text-red-500 hover:text-red-700 rounded-lg shadow-sm transition-all active:scale-95" title="画像を削除">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </div>
          </div>

          <!-- フッター部分 -->
          <div class="mt-3 flex items-center justify-between px-1">
            <div class="flex flex-col min-w-0">
              <span class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider">uploader</span>
              <span class="text-xs font-extrabold text-gray-700 truncate max-w-[90px] sm:max-w-[120px]">${photo.uploaderName || "ゲスト"}</span>
            </div>
            
            <button class="btn-like flex items-center gap-1 px-2.5 py-1.5 rounded-full hover:bg-gray-50 active:scale-90 transition-all">
              <svg class="w-4 h-4 transition-colors ${hasLiked ? 'text-rose-500 fill-rose-500 animate-pulse' : 'text-gray-400'}" fill="${hasLiked ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
              </button>
              <span class="text-xs font-bold leading-none ${hasLiked ? 'text-rose-600' : 'text-gray-500'}">${likedBy.length}</span>
            </button>
          </div>
        `;

        // 拡大イベント
        card.querySelector(".img-click-area").addEventListener("click", () => {
          selectedPhoto = photo;
          openPreviewModal();
        });

        // 停止/イベントstopPropagation
        card.querySelector(".overlay-buttons").addEventListener("click", (e) => e.stopPropagation());

        // 個別ダウンロード
        card.querySelector(".btn-single-download").addEventListener("click", () => {
          downloadPhoto(photo);
        });

        // 個別削除
        card.querySelector(".btn-single-delete").addEventListener("click", () => {
          showConfirm("写真を削除しますか？", "この写真は一覧から完全に消え、戻せません。", () => {
            deletePhoto(photo.id);
          });
        });

        // いいねボタン
        card.querySelector(".btn-like").addEventListener("click", () => {
          toggleLike(photo);
        });

        photoGalleryEl.appendChild(card);
      });
    };

    // 7. 画像の圧縮処理 (高画質＆1MB安全マージン)
    const compressImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            let targetWidth = 1920;
            let targetQuality = 0.85;
            let maxSize = 600000; // 600KB

            if (appSettings.uploadQuality === "standard") {
              targetWidth = 1200;
              targetQuality = 0.75;
              maxSize = 300000;
            } else if (appSettings.uploadQuality === "max") {
              targetWidth = 2560;
              targetQuality = 0.92;
              maxSize = 950000; // 1MB制限寸前
            }

            const attemptCompress = (maxWidth, quality) => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;

              if (width > maxWidth) {
                height = Math.round((height *= maxWidth / width));
                width = maxWidth;
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);

              const dataUrl = canvas.toDataURL('image/jpeg', quality);
              const approximateBytes = Math.round((dataUrl.length * 3) / 4);

              if (approximateBytes > maxSize && approximateBytes > 100000) {
                if (quality > 0.6) {
                  attemptCompress(maxWidth, quality - 0.05);
                } else if (maxWidth > 800) {
                  attemptCompress(maxWidth - 200, 0.6);
                } else {
                  resolve(dataUrl);
                }
              } else {
                resolve(dataUrl);
              }
            };

            attemptCompress(targetWidth, targetQuality);
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    };

    // 8. 画像のアップロード
    const uploadPhotoFile = async (file) => {
      if (!user) {
        showToast("認証が完了していません。少々お待ちください。", true);
        return;
      }
      if (isUploading) return;
      isUploading = true;
      
      showUploadOverlay("画像を圧縮しています...");

      try {
        const base64Image = await compressImage(file);
        showUploadOverlay("サーバーへ送信しています...");

        const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
        await addDoc(photosRef, {
          imageUrl: base64Image,
          timestamp: Date.now(),
          uploaderId: user.uid,
          uploaderName: userName || "ゲスト",
          likedBy: []
        });

        showToast("写真をアップロードしました！");
      } catch (err) {
        console.error("Upload Error:", err);
        showToast("電波エラーが発生しました。もう一度お試しください。", true);
      } finally {
        isUploading = false;
        hideUploadOverlay();
      }
    };

    // 9. いいね（お気に入り）追加・削除
    const toggleLike = async (photo) => {
      if (!user) return;
      const photoRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id);
      const likedBy = photo.likedBy || [];
      const hasLiked = likedBy.includes(user.uid);

      try {
        if (hasLiked) {
          await updateDoc(photoRef, { likedBy: arrayRemove(user.uid) });
        } else {
          await updateDoc(photoRef, { likedBy: arrayUnion(user.uid) });
        }
      } catch (err) {
        console.error("Like Action Error:", err);
      }
    };

    // 10. 写真個別ダウンロード
    const downloadPhoto = (photo) => {
      const link = document.createElement('a');
      link.href = photo.imageUrl;
      link.download = `wedding_${photo.uploaderName || 'guest'}_${photo.id}.jpg`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // 11. 写真個別削除
    const deletePhoto = async (photoId) => {
      if (!user) return;
      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photoId);
        await deleteDoc(docRef);
        showToast("写真を削除しました。");
        closeModal("modal-preview");
      } catch (err) {
        console.error("Delete Error:", err);
        showToast("削除できませんでした。", true);
      }
    };

    // 12. 全件一括ダウンロード (ZIP)
    const handleBulkDownload = async () => {
      if (photos.length === 0) {
        showToast("ダウンロードする写真がありません。", true);
        return;
      }
      showUploadOverlay("一括保存用のZIPファイルを作成中...");
      
      try {
        const zip = new JSZip();
        photos.forEach((photo, idx) => {
          const base64Data = photo.imageUrl.split(',')[1];
          const filename = `${idx + 1}_${photo.uploaderName || 'guest'}_${photo.id}.jpg`;
          zip.file(filename, base64Data, { base64: true });
        });

        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${appSettings.title}_photos.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("一括ダウンロードを開始しました！");
      } catch (err) {
        console.error("ZIP Generate Error:", err);
        showToast("ZIPファイルの書き出しに失敗しました。", true);
      } finally {
        hideUploadOverlay();
      }
    };

    // 13. 全写真一括削除
    const handleBulkDelete = async () => {
      if (!user) return;
      if (photos.length === 0) return;
      showUploadOverlay("全件削除しています...");
      
      try {
        for (const photo of photos) {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id);
          await deleteDoc(docRef);
        }
        showToast("すべての写真を削除しました。");
        closeModal("modal-settings");
      } catch (err) {
        console.error("Bulk Delete Error:", err);
        showToast("一括削除に失敗しました。", true);
      } finally {
        hideUploadOverlay();
      }
    };

    // 14. 設定更新処理 (Firestore同期)
    const triggerUpdateSettings = (updates) => {
      if (!user) return;
      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');
      setDoc(settingsRef, updates, { merge: true }).catch(err => {
        console.error("Settings Update Error:", err);
        showToast("設定変更を保存できませんでした。", true);
      });
    };

    // --- Modal & UI Toggle Logic ---
    window.openModal = (id) => {
      document.getElementById(id).classList.remove("hidden");
    };
    window.closeModal = (id) => {
      document.getElementById(id).classList.add("hidden");
    };

    // 画質UIボタン更新
    const updateQualityUI = (quality, theme) => {
      const qStandard = document.getElementById("quality-standard");
      const qHigh = document.getElementById("quality-high");
      const qMax = document.getElementById("quality-max");

      if (!qStandard || !qHigh || !qMax) return;

      [qStandard, qHigh, qMax].forEach(btn => {
        btn.className = "flex flex-col items-center justify-center p-2 rounded-xl border border-gray-200 text-center bg-white text-gray-700";
        btn.querySelector("span:nth-child(2)").className = "text-[9px] text-gray-400";
      });

      let activeBtn = qHigh;
      if (quality === "standard") activeBtn = qStandard;
      if (quality === "max") activeBtn = qMax;

      activeBtn.className = `flex flex-col items-center justify-center p-2 rounded-xl border border-${theme.accent}-500 text-center bg-${theme.accent}-500 text-white theme-btn`;
      activeBtn.querySelector("span:nth-child(2)").className = "text-[9px] opacity-80";
    };

    window.setQuality = (quality) => {
      triggerUpdateSettings({ uploadQuality: quality });
    };

    // 単一写真プレビュー(拡大)画面
    const openPreviewModal = () => {
      updatePreviewModalUI();
      openModal("modal-preview");
    };

    const updatePreviewModalUI = () => {
      if (!selectedPhoto) return;
      previewImgEl.src = selectedPhoto.imageUrl;
      previewUploaderEl.textContent = selectedPhoto.uploaderName || "ゲスト";
      
      const likes = selectedPhoto.likedBy || [];
      previewLikeTextEl.textContent = `お気に入り (${likes.length}人)`;

      const hasLiked = user && likes.includes(user.uid);
      if (hasLiked) {
        previewLikeHeartEl.classList.add("text-rose-500", "fill-rose-500", "animate-pulse");
        previewLikeHeartEl.classList.remove("text-white");
      } else {
        previewLikeHeartEl.classList.remove("text-rose-500", "fill-rose-500", "animate-pulse");
        previewLikeHeartEl.classList.add("text-white");
      }
    };

    // スライドショー関係
    window.closeSlideshow = () => {
      clearInterval(slideshowTimer);
      slideshowTimer = null;
      closeModal("modal-slideshow");
    };

    const runSlideshowTick = () => {
      if (photos.length === 0) return;
      slideshowImgEl.src = photos[slideshowIndex].imageUrl;
      slideshowUploaderEl.textContent = `撮影: ${photos[slideshowIndex].uploaderName || "ゲスト"}`;
      slideshowCounterEl.textContent = `${slideshowIndex + 1} / ${photos.length}`;
    };

    // --- Action & Event Bindings ---
    const setupEventListeners = () => {
      
      // お名前変更ボタン
      document.getElementById("btn-edit-name").addEventListener("click", () => {
        document.getElementById("input-username-field").value = userName;
        openModal("modal-name");
      });

      // 設定を開くボタン
      document.getElementById("btn-open-settings").addEventListener("click", () => {
        openModal("modal-settings");
      });

      // 保存名決定ボタン
      document.getElementById("btn-save-name").addEventListener("click", () => {
        const val = document.getElementById("input-username-field").value.trim();
        if (!val) {
          showToast("お名前を入力してください。", true);
          return;
        }
        userName = val;
        localStorage.setItem("wedding_uploader_name", userName);
        currentUsernameEl.textContent = userName;
        closeModal("modal-name");
        showToast(`ようこそ！ ${userName} さん`);
      });

      // アップロード：ファイル選択・撮影
      const handleUploadEvent = (e) => {
        const file = e.target.files[0];
        if (file) {
          uploadPhotoFile(file);
        }
      };
      inputAlbumEl.addEventListener("change", handleUploadEvent);
      inputCameraEl.addEventListener("change", handleUploadEvent);

      // 設定ダイアログ：入力内容の連動更新
      settingTitleEl.addEventListener("change", (e) => {
        triggerUpdateSettings({ title: e.target.value });
      });
      settingDateEl.addEventListener("change", (e) => {
        triggerUpdateSettings({ weddingDate: e.target.value });
      });
      settingWelcomeEl.addEventListener("change", (e) => {
        triggerUpdateSettings({ welcomeMessage: e.target.value });
      });

      // テーマカラーピッカー生成
      const themeContainer = document.getElementById("theme-selectors");
      Object.entries(THEMES).forEach(([key, theme]) => {
        const btn = document.createElement("button");
        btn.className = "relative w-9 h-9 rounded-full flex items-center justify-center transition-transform hover:scale-105";
        btn.style.backgroundColor = theme.hex;
        btn.title = key;
        
        btn.addEventListener("click", () => {
          triggerUpdateSettings({ theme: key });
        });
        themeContainer.appendChild(btn);
      });

      // 写真の「もっと見る」ボタン
      btnLoadMoreEl.addEventListener("click", () => {
        visibleCount += 24;
        renderGallery();
      });

      // 並び替えボタンの切り替え
      const sortDateBtn = document.getElementById("sort-date");
      const sortPopularBtn = document.getElementById("sort-popular");

      const updateSortButtons = () => {
        const theme = THEMES[appSettings.theme] || THEMES.rose;
        [sortDateBtn, sortPopularBtn].forEach(btn => {
          btn.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition-all";
        });
        const activeBtn = sortBy === "date" ? sortDateBtn : sortPopularBtn;
        activeBtn.className = `px-3 py-1.5 text-xs font-bold rounded-lg text-white ${theme.button} theme-btn transition-all`;
      };

      sortDateBtn.addEventListener("click", () => {
        sortBy = "date";
        updateSortButtons();
        renderGallery();
      });

      sortPopularBtn.addEventListener("click", () => {
        sortBy = "popular";
        updateSortButtons();
        renderGallery();
      });

      // 個別プレビュー内の操作
      document.getElementById("btn-preview-download").addEventListener("click", () => {
        if (selectedPhoto) downloadPhoto(selectedPhoto);
      });
      document.getElementById("btn-preview-delete").addEventListener("click", () => {
        if (selectedPhoto) {
          showConfirm("この写真を削除しますか？", "削除した写真は元に戻せません。", () => {
            deletePhoto(selectedPhoto.id);
          });
        }
      });
      document.getElementById("btn-preview-like").addEventListener("click", () => {
        if (selectedPhoto) toggleLike(selectedPhoto);
      });

      // スライドショー開始
      document.getElementById("btn-start-slideshow").addEventListener("click", () => {
        if (photos.length === 0) return;
        slideshowIndex = 0;
        slideshowPlaying = true;
        
        slideshowPlayIconEl.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`; // 一時停止アイコン
        openModal("modal-slideshow");
        runSlideshowTick();

        // ループ再起動
        if (slideshowTimer) clearInterval(slideshowTimer);
        slideshowTimer = setInterval(() => {
          if (slideshowPlaying) {
            slideshowIndex = (slideshowIndex + 1) % photos.length;
            runSlideshowTick();
          }
        }, 4000);
      });

      // スライドショーのボタン
      document.getElementById("btn-slideshow-prev").addEventListener("click", () => {
        slideshowIndex = (slideshowIndex - 1 + photos.length) % photos.length;
        runSlideshowTick();
      });
      document.getElementById("btn-slideshow-next").addEventListener("click", () => {
        slideshowIndex = (slideshowIndex + 1) % photos.length;
        runSlideshowTick();
      });
      btnSlideshowToggleEl.addEventListener("click", () => {
        slideshowPlaying = !slideshowPlaying;
        if (slideshowPlaying) {
          slideshowPlayIconEl.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`; // 一時停止
        } else {
          slideshowPlayIconEl.innerHTML = `<path d="M8 5v14l11-7z"/>`; // 再生
        }
      });

      // 一括アクション
      document.getElementById("btn-bulk-download").addEventListener("click", () => {
        handleBulkDownload();
      });
      document.getElementById("btn-bulk-delete").addEventListener("click", () => {
        showConfirm("すべての写真を一括削除しますか？", "サイトにアップされた全写真データが消失し、復元不可能になります。", () => {
          handleBulkDelete();
        });
      });
    };

    // --- Helper Functions ---
    window.showToast = (message, isError = false) => {
      const container = document.getElementById("toast-container");
      const box = document.getElementById("toast-box");
      const text = document.getElementById("toast-text");

      text.textContent = message;
      box.className = isError 
        ? "bg-red-500 text-white px-4 py-3 rounded-xl shadow-lg flex items-center justify-between"
        : "bg-emerald-600 text-white px-4 py-3 rounded-xl shadow-lg flex items-center justify-between";
      
      container.classList.remove("hidden");
      setTimeout(() => {
        hideToast();
      }, 4000);
    };

    window.hideToast = () => {
      document.getElementById("toast-container").classList.add("hidden");
    };

    const showUploadOverlay = (text) => {
      uploadStatusTextEl.textContent = text;
      uploadOverlayEl.classList.remove("hidden");
    };

    const hideUploadOverlay = () => {
      uploadOverlayEl.classList.add("hidden");
    };

    // 削除確認カスタムダイアログ
    const showConfirm = (title, desc, action) => {
      document.getElementById("confirm-title").textContent = title;
      document.getElementById("confirm-desc").textContent = desc;
      openModal("modal-confirm");

      const btnConfirm = document.getElementById("btn-confirm-action");
      // 既存の古いイベントリスナーをリセットするためcloneして置き換え
      const clone = btnConfirm.cloneNode(true);
      btnConfirm.parentNode.replaceChild(clone, btnConfirm);
      
      clone.addEventListener("click", () => {
        action();
        closeModal("modal-confirm");
      });
    };

  </script>
</body>
</html>
